<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'SF Mono','Fira Code',monospace">
  <rect width="800" height="520" fill="#07070a"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ff6b35" font-size="14" font-weight="600"># ERD - FoldersVergelijker</text>
  <text x="400" y="55" text-anchor="middle" fill="#6a6a7a" font-size="10">MariaDB 10.4 - Database ontwerp</text>

  <!-- Categories table -->
  <rect x="40" y="85" width="170" height="130" rx="4" fill="#0d0d14" stroke="#1a1a28"/>
  <rect x="40" y="85" width="170" height="28" rx="4" fill="#1a1a28"/>
  <text x="125" y="104" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="600">categories</text>
  <line x1="40" y1="113" x2="210" y2="113" stroke="#1a1a28"/>
  <text x="52" y="132" fill="#c8c8d0" font-size="10">id <tspan fill="#6a6a7a">INT PK</tspan></text>
  <text x="52" y="150" fill="#c8c8d0" font-size="10">name <tspan fill="#6a6a7a">VARCHAR</tspan></text>
  <text x="52" y="168" fill="#c8c8d0" font-size="10">slug <tspan fill="#6a6a7a">VARCHAR</tspan></text>
  <text x="52" y="186" fill="#6a6a7a" font-size="9">---</text>
  <text x="52" y="202" fill="#6a6a7a" font-size="9">UNIQUE(name)</text>

  <!-- Stores table -->
  <rect x="40" y="260" width="170" height="155" rx="4" fill="#0d0d14" stroke="#1a1a28"/>
  <rect x="40" y="260" width="170" height="28" rx="4" fill="#1a1a28"/>
  <text x="125" y="279" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="600">stores</text>
  <line x1="40" y1="288" x2="210" y2="288" stroke="#1a1a28"/>
  <text x="52" y="307" fill="#c8c8d0" font-size="10">id <tspan fill="#6a6a7a">INT PK</tspan></text>
  <text x="52" y="325" fill="#c8c8d0" font-size="10">name <tspan fill="#6a6a7a">VARCHAR</tspan></text>
  <text x="52" y="343" fill="#c8c8d0" font-size="10">country <tspan fill="#6a6a7a">CHAR(2)</tspan></text>
  <text x="52" y="361" fill="#c8c8d0" font-size="10">chain <tspan fill="#6a6a7a">VARCHAR</tspan></text>
  <text x="52" y="379" fill="#c8c8d0" font-size="10">active <tspan fill="#6a6a7a">TINYINT</tspan></text>
  <text x="52" y="397" fill="#6a6a7a" font-size="9">---</text>
  <text x="52" y="413" fill="#6a6a7a" font-size="9">22 winkels (NL+DE)</text>

  <!-- Products table -->
  <rect x="315" y="85" width="170" height="180" rx="4" fill="#0d0d14" stroke="#1a1a28"/>
  <rect x="315" y="85" width="170" height="28" rx="4" fill="#1a1a28"/>
  <text x="400" y="104" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="600">products</text>
  <line x1="315" y1="113" x2="485" y2="113" stroke="#1a1a28"/>
  <text x="327" y="132" fill="#c8c8d0" font-size="10">id <tspan fill="#6a6a7a">INT PK</tspan></text>
  <text x="327" y="150" fill="#c8c8d0" font-size="10">name <tspan fill="#6a6a7a">VARCHAR</tspan></text>
  <text x="327" y="168" fill="#c8c8d0" font-size="10">category_id <tspan fill="#6a6a7a">INT FK</tspan></text>
  <text x="327" y="186" fill="#c8c8d0" font-size="10">brand <tspan fill="#6a6a7a">VARCHAR</tspan></text>
  <text x="327" y="204" fill="#c8c8d0" font-size="10">unit <tspan fill="#6a6a7a">VARCHAR</tspan></text>
  <text x="327" y="222" fill="#c8c8d0" font-size="10">barcode <tspan fill="#6a6a7a">VARCHAR</tspan></text>
  <text x="327" y="240" fill="#c8c8d0" font-size="10">created_at <tspan fill="#6a6a7a">TIMESTAMP</tspan></text>
  <text x="327" y="258" fill="#6a6a7a" font-size="9">5.219 producten</text>

  <!-- Prices table -->
  <rect x="315" y="310" width="170" height="180" rx="4" fill="#0d0d14" stroke="#1a1a28"/>
  <rect x="315" y="310" width="170" height="28" rx="4" fill="#1a1a28"/>
  <text x="400" y="329" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="600">prices</text>
  <line x1="315" y1="338" x2="485" y2="338" stroke="#1a1a28"/>
  <text x="327" y="357" fill="#c8c8d0" font-size="10">id <tspan fill="#6a6a7a">INT PK</tspan></text>
  <text x="327" y="375" fill="#c8c8d0" font-size="10">product_id <tspan fill="#6a6a7a">INT FK</tspan></text>
  <text x="327" y="393" fill="#c8c8d0" font-size="10">store_id <tspan fill="#6a6a7a">INT FK</tspan></text>
  <text x="327" y="411" fill="#c8c8d0" font-size="10">price <tspan fill="#6a6a7a">DECIMAL</tspan></text>
  <text x="327" y="429" fill="#c8c8d0" font-size="10">unit_price <tspan fill="#6a6a7a">DECIMAL</tspan></text>
  <text x="327" y="447" fill="#c8c8d0" font-size="10">date <tspan fill="#6a6a7a">DATE</tspan></text>
  <text x="327" y="465" fill="#c8c8d0" font-size="10">source <tspan fill="#6a6a7a">VARCHAR</tspan></text>
  <text x="327" y="483" fill="#6a6a7a" font-size="9">4.129 prijzen | UPSERT/dag</text>

  <!-- Relations box -->
  <rect x="570" y="85" width="200" height="170" rx="4" fill="#0d0d14" stroke="#1a1a28"/>
  <rect x="570" y="85" width="200" height="28" rx="4" fill="#1a1a28"/>
  <text x="670" y="104" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="600">Relaties</text>
  <line x1="570" y1="113" x2="770" y2="113" stroke="#1a1a28"/>
  <text x="582" y="134" fill="#c8c8d0" font-size="10">categories 1:N products</text>
  <text x="582" y="154" fill="#c8c8d0" font-size="10">products 1:N prices</text>
  <text x="582" y="174" fill="#c8c8d0" font-size="10">stores 1:N prices</text>
  <text x="582" y="200" fill="#6a6a7a" font-size="9">---</text>
  <text x="582" y="218" fill="#6a6a7a" font-size="9">UNIQUE(product_id,</text>
  <text x="582" y="232" fill="#6a6a7a" font-size="9">  store_id, date)</text>

  <!-- Notes box -->
  <rect x="570" y="280" width="200" height="110" rx="4" fill="#0d0d14" stroke="#1a1a28"/>
  <rect x="570" y="280" width="200" height="28" rx="4" fill="#1a1a28"/>
  <text x="670" y="299" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="600">Ontwerp keuzes</text>
  <line x1="570" y1="308" x2="770" y2="308" stroke="#1a1a28"/>
  <text x="582" y="328" fill="#6a6a7a" font-size="9">Upsert per dag: voorkomt</text>
  <text x="582" y="343" fill="#6a6a7a" font-size="9">duplicaten bij daily scrape</text>
  <text x="582" y="363" fill="#6a6a7a" font-size="9">unit_price: prijs per eenheid</text>
  <text x="582" y="378" fill="#6a6a7a" font-size="9">(per 100g/kg/L) berekend</text>

  <!-- Arrows: categories -> products -->
  <line x1="210" y1="150" x2="315" y2="168" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
  <polygon points="312,165 320,168 312,171" fill="#ff6b35" opacity="0.5"/>
  
  <!-- Arrows: products -> prices -->
  <line x1="400" y1="265" x2="400" y2="310" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
  <polygon points="397,307 400,315 403,307" fill="#ff6b35" opacity="0.5"/>
  
  <!-- Arrows: stores -> prices -->
  <line x1="210" y1="375" x2="315" y2="393" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
  <polygon points="312,390 320,393 312,396" fill="#ff6b35" opacity="0.5"/>

  <!-- Footer -->
  <text x="400" y="508" text-anchor="middle" fill="#6a6a7a" font-size="9">Jasper van Kalsbeek - FoldersVergelijker Database Ontwerp - 2026</text>
</svg>
