<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #07070a;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .card {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .logo {
    width: 80px;
    height: 80px;
    background: #0d0d14;
    border-radius: 16px;
    border: 1px solid #1a1a28;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo span {
    font-size: 48px;
    font-weight: 600;
    color: #c8c8d0;
  }
  .logo .dot {
    color: #ff6b35;
    font-size: 48px;
    margin-left: -4px;
  }
  h1 {
    color: #e8e8f0;
    font-size: 42px;
    font-weight: 600;
    letter-spacing: -0.5px;
    text-align: center;
  }
  p {
    color: #6a6a80;
    font-size: 20px;
    font-weight: 400;
    text-align: center;
    max-width: 600px;
    line-height: 1.5;
  }
  .accent {
    width: 40px;
    height: 3px;
    background: #ff6b35;
    border-radius: 2px;
  }
  .url {
    position: absolute;
    bottom: 40px;
    color: #3a3a4a;
    font-size: 16px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="logo">
      <span>j<span class="dot">.</span></span>
    </div>
    <h1>Jasper van Kalsbeek</h1>
    <div class="accent"></div>
    <p>Software developer - Webdevelopment, Security & Data-gedreven applicaties</p>
  </div>
  <div class="url">jaspervkalsbeek-svg.github.io</div>
</body>
</html>
